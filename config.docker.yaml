# GCS-Distill Docker Compose 配置文件

# HTTP 服务配置
server:
  host: 0.0.0.0
  port: 8080
  mode: release

# 数据库配置
database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: gcs_distill
  sslmode: disable
  max_conns: 25
  min_conns: 5

# Redis 配置
redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 10

# 共享存储配置
storage:
  type: nfs
  base_path: /mnt/shared/distill  # 容器内路径，映射到宿主机 /storage-md0/renyuan/gcs-distill-data/shared-workspace

# gRPC 配置
grpc:
  port: 50051
  max_recv_msg_size: 10
  max_send_msg_size: 10
  connection_timeout: 30

# 日志配置
logging:
  level: info
  output: stdout
  file_path: /var/log/gcs-distill/server.log  # 容器内路径，映射到宿主机 /storage-md0/renyuan/gcs-distill-data/logs
  max_size: 100
  max_age: 7
  compress: true